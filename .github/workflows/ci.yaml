name: Quality Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Prettier
        run: yarn lint:prettier:check

      - name: Linting
        run: yarn lint:eslint:check

      - name: Typechecking
        run: yarn typecheck

      - name: Build
        run: yarn build
